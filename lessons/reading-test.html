<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Test — IELTS Lesson Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f5f0e8;
      --ink:        #1a1612;
      --muted:      #7a6f62;
      --border:     #e2d9cc;
      --green:      #2c6e4f;
      --green-dark: #1a4731;
      --correct:    #2c6e4f;
      --wrong:      #c62828;
      --topbar-h:   52px;
      --btmbar-h:   52px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
    }

    /* ── Top Bar ── */
    .test-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      z-index: 100;
      gap: 1rem;
    }
    .back-link {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--ink); }

    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
    }
    .timer-icon { font-size: 1.05rem; }
    #timer-display {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 3.4rem;
      text-align: center;
    }
    .timer-label { color: var(--muted); font-size: 0.8rem; }
    .timer-wrap.warn { color: #c4411b; }

    .topbar-actions { display: flex; gap: 0.55rem; align-items: center; }
    .review-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.38rem 0.85rem;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--ink);
      font-family: inherit;
      transition: background 0.15s;
    }
    .review-btn:hover { background: var(--bg); }
    .submit-btn {
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 0.42rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #0f2d1e; }

    /* ── Main Split ── */
    .test-main {
      position: fixed;
      top: var(--topbar-h);
      bottom: var(--btmbar-h);
      left: 0; right: 0;
      display: grid;
      grid-template-columns: 1fr 4px 1fr;
      overflow: hidden;
    }
    .passage-pane {
      overflow-y: auto;
      overflow-x: hidden;
      background: #fafaf8;
    }
    .questions-pane {
      overflow-y: auto;
      overflow-x: hidden;
      background: #fff;
    }

    /* ── Resizer ── */
    .resizer {
      background: var(--border);
      cursor: col-resize;
      transition: background 0.15s;
      position: relative;
    }
    .resizer::after { content: ''; position: absolute; inset: 0; margin: 0 -5px; }
    .resizer:hover, .resizer.dragging { background: var(--green); }

    /* ── Passage ── */
    .passage-inner { padding: 1.5rem 2rem 3rem; max-width: 680px; }
    .passage-instruction {
      font-size: 0.83rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 1.25rem;
      line-height: 1.6;
    }
    .passage-banner {
      border-radius: 12px;
      background: linear-gradient(135deg, #2c6e4f 55%, #1a4731 100%);
      padding: 1.2rem 1.5rem;
      color: #fff;
      margin-bottom: 1.5rem;
    }
    .passage-tag {
      font-size: 0.69rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 0.3rem;
    }
    .passage-banner h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.25;
    }
    .passage-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .passage-body p {
      font-size: 0.9rem;
      line-height: 1.8;
      margin-bottom: 1.1rem;
      color: #2a2520;
    }
    .passage-body p:last-child { margin-bottom: 0; }
    .para-label { font-weight: 700; }

    /* ── Questions ── */
    .questions-inner { padding: 1.5rem 1.75rem 3rem; max-width: 620px; }
    .q-group { margin-bottom: 2.5rem; }
    .q-group-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 0.35rem;
    }
    .q-group-instr {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 1.1rem;
    }
    .q-group-instr em { color: var(--wrong); font-style: normal; font-weight: 700; }

    .q-item {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.6rem 0.7rem;
      border-radius: 8px;
      margin-bottom: 0.6rem;
      transition: background 0.12s;
    }
    .q-item:hover { background: #faf8f5; }
    .q-item.q-correct { background: #eef8f3; }
    .q-item.q-wrong   { background: #fff2f2; }

    .q-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      min-width: 1.3rem;
      padding-top: 0.38rem;
      flex-shrink: 0;
    }
    .q-badge {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 0.22rem;
    }
    .q-body { flex: 1; min-width: 0; }
    .q-text { font-size: 0.875rem; line-height: 1.55; display: block; }
    .sc-sentence { font-size: 0.875rem; line-height: 1.85; display: block; }
    .correct-hint {
      display: block;
      font-size: 0.75rem;
      color: var(--correct);
      font-weight: 600;
      margin-top: 0.2rem;
    }

    /* Multiple choice options */
    .mc-options { display: flex; flex-direction: column; gap: 0.35rem; margin-top: 0.45rem; }
    .mc-option {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .mc-option:hover { background: #f0f0eb; }
    .mc-option input[type="radio"] { margin-top: 0.18rem; flex-shrink: 0; accent-color: var(--green); }
    .mc-option-label { font-size: 0.855rem; line-height: 1.5; }
    .mc-letter { font-weight: 700; min-width: 1rem; }

    /* Inputs */
    .q-select, .q-input {
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.81rem;
      font-family: inherit;
      color: var(--ink);
      background: #faf8f5;
      outline: none;
      transition: border-color 0.15s;
    }
    .q-select {
      padding: 0.3rem 0.5rem;
      cursor: pointer;
      min-width: 66px;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }
    .q-input {
      padding: 0.26rem 0.5rem;
      width: 120px;
      display: inline-block;
      vertical-align: middle;
    }
    .q-select:focus, .q-input:focus { border-color: var(--green); }
    .q-item.q-correct .q-select,
    .q-item.q-correct .q-input { border-color: var(--correct); background: #f0f9f4; }
    .q-item.q-wrong .q-select,
    .q-item.q-wrong .q-input   { border-color: var(--wrong); background: #fff5f5; }

    /* ── Bottom Bar ── */
    .test-bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--btmbar-h);
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.75rem;
      z-index: 100;
      overflow-x: auto;
    }
    .part-tabs { display: flex; gap: 0.3rem; flex-shrink: 0; }
    .part-tab {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.28rem 0.65rem;
      font-size: 0.74rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: var(--muted);
      white-space: nowrap;
      transition: all 0.15s;
    }
    .part-tab.active { background: var(--bg); color: var(--ink); border-color: var(--ink); }
    .part-count { font-weight: 400; color: var(--muted); margin-left: 0.3rem; }
    .q-nav { display: flex; gap: 0.22rem; align-items: center; }
    .nav-circle {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      font-size: 0.71rem;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: all 0.12s;
      font-family: inherit;
      flex-shrink: 0;
    }
    .nav-circle:hover { border-color: var(--green); color: var(--green); }
    .nav-circle.answered       { background: var(--green); border-color: var(--green); color: #fff; }
    .nav-circle.circle-correct { background: var(--correct); border-color: var(--correct); color: #fff; }
    .nav-circle.circle-wrong   { background: var(--wrong);   border-color: var(--wrong);   color: #fff; }

    /* ── Score Overlay ── */
    .score-overlay {
      position: fixed; inset: 0;
      background: rgba(20,15,10,0.55);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    .score-overlay[hidden] { display: none; }
    .score-modal {
      background: #fff;
      border-radius: 18px;
      padding: 2.5rem 2rem 2rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    }
    .score-modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .score-num {
      font-family: 'Playfair Display', serif;
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
    }
    .score-pct { font-size: 0.88rem; color: var(--muted); margin-top: 0.25rem; }
    .score-band {
      display: inline-block;
      margin: 0.9rem auto 1.75rem;
      padding: 0.45rem 1.1rem;
      background: #eef8f3;
      border-radius: 8px;
      font-size: 0.93rem;
      font-weight: 600;
      color: var(--green-dark);
    }
    .score-actions { display: flex; gap: 0.7rem; justify-content: center; flex-wrap: wrap; }
    .score-review-btn {
      background: var(--green-dark); color: #fff;
      border: none; border-radius: 9px;
      padding: 0.55rem 1.1rem;
      font-size: 0.86rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .score-review-btn:hover { background: #0f2d1e; }
    .score-hub-link {
      display: inline-flex; align-items: center;
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 9px;
      font-size: 0.86rem; color: var(--ink);
      text-decoration: none; font-weight: 500;
      transition: background 0.15s;
    }
    .score-hub-link:hover { background: var(--bg); }

    /* ── Error state ── */
    .test-error {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; padding: 2rem; text-align: center;
    }

    /* ── Mobile ── */
    @media (max-width: 700px) {
      body { overflow: auto; }
      .test-main {
        position: static;
        display: flex; flex-direction: column;
        height: auto;
        margin-top: var(--topbar-h);
        margin-bottom: var(--btmbar-h);
      }
      .passage-pane, .questions-pane { overflow: visible; height: auto; }
      .resizer { display: none; }
      .passage-inner { padding: 1.1rem 1rem 1.5rem; }
      .questions-inner { padding: 1.1rem 1rem 2rem; }
      .topbar-actions .review-btn { display: none; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<header class="test-topbar">
  <a href="reading-task1.html#samples" class="back-link">← Reading</a>
  <div class="timer-wrap" id="timer-wrap">
    <span class="timer-icon">⏱</span>
    <strong id="timer-display">60:00</strong>
    <span class="timer-label">remaining</span>
  </div>
  <div class="topbar-actions">
    <button class="review-btn" id="review-btn">Review</button>
    <button class="submit-btn" id="submit-btn">Submit &#10148;</button>
  </div>
</header>

<!-- Main -->
<div class="test-main" id="test-main">
  <div class="passage-pane" id="passage-pane">
    <div class="passage-inner" id="passage-inner">
      <p class="passage-instruction" id="passage-instruction"></p>
      <div class="passage-banner" id="passage-banner">
        <div class="passage-tag" id="passage-tag"></div>
        <h2 id="passage-banner-title"></h2>
      </div>
      <h3 class="passage-title" id="passage-title"></h3>
      <div class="passage-body" id="passage-body"></div>
    </div>
  </div>

  <div class="resizer" id="resizer"></div>

  <div class="questions-pane" id="questions-pane">
    <div class="questions-inner" id="questions-inner"></div>
  </div>
</div>

<!-- Bottom Bar -->
<footer class="test-bottombar">
  <div class="part-tabs">
    <button class="part-tab active">
      Part 1<span class="part-count" id="part1-count">&nbsp;· 0 of …</span>
    </button>
    <button class="part-tab">Part 2</button>
    <button class="part-tab">Part 3</button>
  </div>
  <div class="q-nav" id="q-nav"></div>
</footer>

<!-- Score Overlay -->
<div class="score-overlay" id="score-overlay" hidden>
  <div class="score-modal">
    <h2>Your Score</h2>
    <div id="score-display"></div>
    <div class="score-actions">
      <button class="score-review-btn" id="close-overlay-btn">Review Answers</button>
      <a href="reading-task1.html#samples" class="score-hub-link">More Tests</a>
    </div>
  </div>
</div>

<!-- Load test data, then run the player -->
<script src="reading-tests-data.js"></script>
<script>
(function () {
  'use strict';

  /* ── 1. Resolve test from URL ?id= ── */
  var params = new URLSearchParams(window.location.search);
  var testId = parseInt(params.get('id') || '1', 10);
  var test = null;
  for (var i = 0; i < READING_TESTS.length; i++) {
    if (READING_TESTS[i].id === testId) { test = READING_TESTS[i]; break; }
  }

  if (!test) {
    document.body.innerHTML = '<div class="test-error"><p style="font-size:1.1rem;font-weight:600">Test not found.</p><a href="reading-task1.html#samples" style="color:#2c6e4f">← Back to reading tests</a></div>';
    return;
  }

  document.title = test.passage.title + ' — IELTS Reading Test';

  /* ── 2. Render passage ── */
  document.getElementById('passage-instruction').innerHTML = test.passage.instruction || '';
  document.getElementById('passage-tag').textContent = test.passage.label || 'Reading Passage';
  document.getElementById('passage-banner-title').textContent = test.passage.title;
  document.getElementById('passage-title').textContent = test.passage.title;

  var passageBody = document.getElementById('passage-body');
  test.passage.paragraphs.forEach(function (para) {
    var p = document.createElement('p');
    var label = document.createElement('span');
    label.className = 'para-label';
    label.textContent = para.label + '.';
    p.appendChild(label);
    p.appendChild(document.createTextNode(' ' + para.text));
    passageBody.appendChild(p);
  });

  /* ── 3. Render questions & build CORRECT map ── */
  var CORRECT = {};
  var TOTAL = 0;
  var container = document.getElementById('questions-inner');

  test.groups.forEach(function (group) {
    var groupEl = document.createElement('div');
    groupEl.className = 'q-group';

    var titleEl = document.createElement('h3');
    titleEl.className = 'q-group-title';
    titleEl.textContent = group.title;
    groupEl.appendChild(titleEl);

    var instrEl = document.createElement('p');
    instrEl.className = 'q-group-instr';
    instrEl.innerHTML = group.instruction || '';
    groupEl.appendChild(instrEl);

    group.questions.forEach(function (q) {
      CORRECT[q.id] = q.answer;
      TOTAL++;
      var n = parseInt(q.id.replace('q', ''), 10);
      var item = buildQuestionItem(group, q, n);
      groupEl.appendChild(item);
    });

    container.appendChild(groupEl);
  });

  document.getElementById('part1-count').textContent = '· 0 of ' + TOTAL;

  function buildQuestionItem(group, q, n) {
    var item = document.createElement('div');
    item.className = 'q-item';
    item.id = q.id;

    if (group.type === 'sentence-completion') {
      var badge = document.createElement('div');
      badge.className = 'q-badge';
      badge.textContent = n;
      item.appendChild(badge);

      var body = document.createElement('div');
      body.className = 'q-body';

      var sentence = document.createElement('span');
      sentence.className = 'sc-sentence';
      if (q.before) sentence.appendChild(document.createTextNode(q.before + ' '));
      var inp = document.createElement('input');
      inp.type = 'text'; inp.className = 'q-input'; inp.dataset.qid = q.id;
      inp.placeholder = '…'; inp.setAttribute('aria-label', 'Question ' + n);
      sentence.appendChild(inp);
      if (q.after) sentence.appendChild(document.createTextNode(' ' + q.after));
      body.appendChild(sentence);
      body.appendChild(makeHint(q.answer));
      item.appendChild(body);

    } else if (group.type === 'multiple-choice') {
      var numEl = document.createElement('span');
      numEl.className = 'q-num'; numEl.textContent = n + '.';
      item.appendChild(numEl);

      var body2 = document.createElement('div');
      body2.className = 'q-body';
      var qText = document.createElement('span');
      qText.className = 'q-text'; qText.textContent = q.text;
      body2.appendChild(qText);

      var opts = document.createElement('div');
      opts.className = 'mc-options';
      var letters = ['A', 'B', 'C', 'D'];
      (q.options || []).forEach(function (optText, oi) {
        var lbl = document.createElement('label');
        lbl.className = 'mc-option';
        var radio = document.createElement('input');
        radio.type = 'radio'; radio.name = q.id; radio.value = letters[oi];
        radio.className = 'q-radio'; radio.dataset.qid = q.id;
        var letterSpan = document.createElement('span');
        letterSpan.className = 'mc-letter'; letterSpan.textContent = letters[oi];
        var textSpan = document.createElement('span');
        textSpan.className = 'mc-option-label'; textSpan.textContent = optText;
        lbl.appendChild(radio); lbl.appendChild(letterSpan); lbl.appendChild(textSpan);
        opts.appendChild(lbl);
      });
      body2.appendChild(opts);
      body2.appendChild(makeHint(q.answer));
      item.appendChild(body2);

    } else {
      /* paragraph-matching or tfng */
      var numEl2 = document.createElement('span');
      numEl2.className = 'q-num'; numEl2.textContent = n + '.';
      item.appendChild(numEl2);

      var sel = document.createElement('select');
      sel.className = 'q-select'; sel.dataset.qid = q.id;
      sel.setAttribute('aria-label', 'Question ' + n);
      var blank = document.createElement('option');
      blank.value = ''; blank.textContent = '—'; sel.appendChild(blank);

      var selOpts = group.type === 'tfng'
        ? ['True', 'False', 'Not Given']
        : (group.options || ['A', 'B', 'C', 'D', 'E']);
      selOpts.forEach(function (v) {
        var o = document.createElement('option');
        o.value = v; o.textContent = v; sel.appendChild(o);
      });
      item.appendChild(sel);

      var body3 = document.createElement('div');
      body3.className = 'q-body';
      var txt = document.createElement('span');
      txt.className = 'q-text'; txt.textContent = q.text;
      body3.appendChild(txt);
      body3.appendChild(makeHint(q.answer));
      item.appendChild(body3);
    }

    return item;
  }

  function makeHint(answer) {
    var hint = document.createElement('span');
    hint.className = 'correct-hint';
    hint.hidden = true;
    hint.textContent = '✓ ' + answer;
    return hint;
  }

  /* ── 4. Bottom nav circles ── */
  var qNav = document.getElementById('q-nav');
  for (var j = 1; j <= TOTAL; j++) {
    (function (n) {
      var btn = document.createElement('button');
      btn.className = 'nav-circle';
      btn.dataset.qid = 'q' + n;
      btn.textContent = n;
      btn.setAttribute('aria-label', 'Go to question ' + n);
      btn.addEventListener('click', function () {
        var target = document.getElementById('q' + n);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
      qNav.appendChild(btn);
    })(j);
  }

  /* ── 5. Answer tracking ── */
  var answers = {};

  function onAnswerChange(qid, val) {
    if (val) { answers[qid] = val; } else { delete answers[qid]; }
    refreshNav(); refreshCount();
  }

  document.addEventListener('change', function (e) {
    var el = e.target;
    if (el.classList.contains('q-select') || el.classList.contains('q-radio')) {
      onAnswerChange(el.dataset.qid, el.value.trim());
    }
  });
  document.addEventListener('input', function (e) {
    var el = e.target;
    if (el.classList.contains('q-input')) {
      onAnswerChange(el.dataset.qid, el.value.trim());
    }
  });

  function refreshNav() {
    document.querySelectorAll('.nav-circle').forEach(function (c) {
      c.classList.toggle('answered', !!answers[c.dataset.qid]);
    });
  }
  function refreshCount() {
    var n = Object.keys(answers).length;
    document.getElementById('part1-count').textContent = '· ' + n + ' of ' + TOTAL;
  }

  /* ── 6. Timer ── */
  var timeLeft = (test.time || 60) * 60;
  var timerEl  = document.getElementById('timer-display');
  var timerWrap = document.getElementById('timer-wrap');
  function pad(n) { return String(n).padStart(2, '0'); }
  function renderTimer() {
    timerEl.textContent = pad(Math.floor(timeLeft / 60)) + ':' + pad(timeLeft % 60);
    if (timeLeft <= 300) timerWrap.classList.add('warn');
  }
  renderTimer();
  var timerInterval = setInterval(function () {
    if (timeLeft <= 0) { clearInterval(timerInterval); handleSubmit(); return; }
    timeLeft--;
    renderTimer();
  }, 1000);

  /* ── 7. Resizer ── */
  var resizer  = document.getElementById('resizer');
  var testMain = document.getElementById('test-main');
  var dragging = false;
  resizer.addEventListener('mousedown', function (e) {
    dragging = true; resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function (e) {
    if (!dragging) return;
    var rect = testMain.getBoundingClientRect();
    var pct = Math.max(25, Math.min(75, ((e.clientX - rect.left) / rect.width) * 100));
    testMain.style.gridTemplateColumns = pct.toFixed(1) + '% 4px ' + (100 - pct - 0.3).toFixed(1) + '%';
  });
  document.addEventListener('mouseup', function () {
    if (!dragging) return;
    dragging = false; resizer.classList.remove('dragging');
    document.body.style.cursor = ''; document.body.style.userSelect = '';
  });

  /* ── 8. Submit ── */
  var submitted = false;
  function handleSubmit() {
    if (submitted) return;
    submitted = true;
    clearInterval(timerInterval);

    var correct = 0;
    Object.keys(CORRECT).forEach(function (id) {
      var user     = (answers[id] || '').toLowerCase().trim();
      var expected = CORRECT[id].toLowerCase().trim();
      var ok = (user === expected);
      if (ok) correct++;

      var item = document.getElementById(id);
      if (item) {
        item.classList.add(ok ? 'q-correct' : 'q-wrong');
        if (!ok) { var h = item.querySelector('.correct-hint'); if (h) h.hidden = false; }
      }
      var circle = document.querySelector('.nav-circle[data-qid="' + id + '"]');
      if (circle) {
        circle.classList.remove('answered');
        circle.classList.add(ok ? 'circle-correct' : 'circle-wrong');
      }
    });

    var pct  = Math.round(correct / TOTAL * 100);
    var band = bandEstimate(correct);
    document.getElementById('score-display').innerHTML =
      '<div class="score-num">' + correct + ' / ' + TOTAL + '</div>' +
      '<div class="score-pct">' + pct + '% correct</div>' +
      '<div class="score-band">Estimated Band: ' + band + '</div>';
    document.getElementById('score-overlay').hidden = false;
  }

  function bandEstimate(c) {
    var p = c / TOTAL;
    if (p >= 0.92) return '8.5 – 9';
    if (p >= 0.77) return '7.5 – 8';
    if (p >= 0.62) return '6.5 – 7';
    if (p >= 0.46) return '5.5 – 6';
    if (p >= 0.38) return '5.0';
    return 'Below 5';
  }

  document.getElementById('submit-btn').addEventListener('click', handleSubmit);
  document.getElementById('close-overlay-btn').addEventListener('click', function () {
    document.getElementById('score-overlay').hidden = true;
  });
  document.getElementById('review-btn').addEventListener('click', function () {
    document.getElementById('questions-pane').scrollTo({ top: 0, behavior: 'smooth' });
  });

})();
</script>
</body>
</html>
