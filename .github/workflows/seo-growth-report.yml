name: SEO Growth Report Agent

on:
  workflow_dispatch: {}
  # Draft-only by design: no `schedule:` trigger yet. Uncomment once you're
  # happy with a few manually-triggered reports (run before the blog agent
  # so it can seed the backlog):
  # schedule:
  #   - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  growth-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "marketing-agent[bot]"
          git config user.email "marketing-agent@users.noreply.github.com"

      - name: Run growth report agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/growth_report_agent.py
