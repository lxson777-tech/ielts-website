name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        env:
          # Essay-grader Worker URL (repo Settings → Secrets and variables →
          # Actions → Variables). Empty = writing checker uses the offline
          # sample grader.
          PUBLIC_GRADER_URL: ${{ vars.PUBLIC_GRADER_URL }}
          # Speaking-grader Worker URL, same pattern. Empty = speaking checker
          # uses the offline sample grader.
          PUBLIC_SPEAKING_GRADER_URL: ${{ vars.PUBLIC_SPEAKING_GRADER_URL }}
          # Live-examiner token Worker URL. Not a secret (it ships in the
          # client bundle), so the deployed URL doubles as the default; a
          # repo Variable of the same name overrides it.
          PUBLIC_LIVE_EXAMINER_URL: ${{ vars.PUBLIC_LIVE_EXAMINER_URL || 'https://ielts-live-examiner.lxson777.workers.dev' }}
          # Supabase project (accounts + cross-device sync). Both are public
          # client keys — the anon key is RLS-guarded, safe to ship. Empty =
          # accounts disabled, site stays anonymous/localStorage-only.
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
