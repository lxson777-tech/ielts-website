name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        env:
          # Essay-grader Worker URL (repo Settings → Secrets and variables →
          # Actions → Variables). Empty = writing checker uses the offline
          # sample grader.
          PUBLIC_GRADER_URL: ${{ vars.PUBLIC_GRADER_URL }}
          # Speaking-grader Worker URL, same pattern. Empty = speaking checker
          # uses the offline sample grader.
          PUBLIC_SPEAKING_GRADER_URL: ${{ vars.PUBLIC_SPEAKING_GRADER_URL }}
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
